# Kyra driver — CI: lint + typecheck on every push & PR.
# Production-grade pattern: same workflow runs locally via `act` if you want to
# debug. Cache npm + Expo CLI to keep runs under 90 seconds.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint --if-present
